<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 Berkeley Omnium Volunteer Hub</title>
    <meta name="description" content="Sign up to volunteer for the 2026 Berkeley Omnium. Browse roles, manage your signups, and help make the race a success." />
    <meta property="og:title" content="2026 Berkeley Omnium Volunteer Hub" />
    <meta property="og:site_name" content="2026 Berkeley Omnium Volunteer Hub" />
    <meta property="og:description" content="Sign up to volunteer for the 2026 Berkeley Omnium. Browse roles, manage your signups, and help make the race a success." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="2026 Berkeley Omnium Volunteer Hub" />
  </head>
  <body>
    <script>
      (function () {
        try {
          /** Magic link: Supabase appends #access_token=… to redirectTo. If redirectTo is
           *  origin/#/auth/callback, the result is #/auth/callback#access_token=… (invalid double
           *  fragment). Collapse to #access_token=… so GoTrue + the SPA can parse (see ARCHITECTURE §7). */
          var h = location.hash;
          if (h.indexOf('#/auth/callback#') === 0) {
            var tail = h.slice('#/auth/callback#'.length);
            if (tail.indexOf('access_token=') !== -1 || tail.indexOf('type=') !== -1) {
              location.replace(location.origin + location.pathname + location.search + '#' + tail);
            }
          }
          var p = location.pathname.replace(/\/$/, '') || '/';
          if (p === '/kids' && (!location.hash || location.hash === '#')) {
            history.replaceState(null, '', '/#/kids');
          }
          if (p === '/contacts' && (!location.hash || location.hash === '#')) {
            var contactsEnd = new Date('2026-04-19T23:59:59.999-07:00').getTime();
            if (Date.now() <= contactsEnd) {
              history.replaceState(null, '', '/#/contacts');
            } else {
              history.replaceState(null, '', '/#/');
            }
          }
        } catch (e) {}
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
